name: Promote RC to Release
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  open-promotion-pr:
    name: Open or update promotion PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open or update promotion PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git log origin/release..origin/main --oneline)" ]; then
            echo "release is up to date with main; nothing to promote."
            exit 0
          fi
          existing=$(gh pr list --base release --head main --state open --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create \
              --base release \
              --head main \
              --title "chore(release): promote main to release" \
              --body "Automated promotion PR. Merge to cut a stable release from the latest RC."
          else
            echo "Promotion PR #$existing already open."
          fi
