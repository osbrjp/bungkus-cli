name: Run Tests
on:
  pull_request:
    types: [review_requested, synchronize, labeled]
  push:
    branches:
      - "main"
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  run-tests:
    if: |
      (github.event.action == 'review_requested' ||
      (github.event.action == 'labeled' && github.event.label.name == 'ci-testing') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'ci-testing'))) ||
      (github.event_name == 'push')

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/github-script@v9
        name: Set 'ci-testing' label
        if: github.event.action == 'review_requested'
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ["ci-testing"]
            })
      - uses: actions/setup-go@v5
        with:
          # Use the latest 1.25 patch so the toolchain's standard library carries
          # stdlib security fixes. govulncheck flags stdlib advisories against the
          # exact toolchain version, and go.mod's `go 1.25.0` would pin an
          # unpatched stdlib (crypto/tls, net/textproto, crypto/x509 advisories).
          go-version: "1.25.x"
      - name: Build and run tests
        run: |
          go build -o /dev/null .
          go test ./...
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
