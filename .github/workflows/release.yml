name: Release
on:
  push:
    branches:
      - main     # canary channel: publishes vX.Y.Z-canary.N pre-releases
      - release  # stable channel: publishes vX.Y.Z + git tag

jobs:
  deployment:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deployment
        run: |
          echo "Deployment pipeline here"

  semantic-release:
    name: Semantic Release
    needs: deployment
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semrel.outputs.new_release_published }}
      new_release_git_tag: ${{ steps.semrel.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - id: semrel
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build binary (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.new_release_git_tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-s -w -X main.Version=${{ needs.semantic-release.outputs.new_release_git_tag }}" -o bungkus-cli-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bungkus-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bungkus-cli-${{ matrix.goos }}-${{ matrix.goarch }}

  upload-assets:
    name: Attach binaries to release
    needs: [semantic-release, build]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage binaries and generate checksums
        run: |
          mkdir -p assets
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              cp "$file" assets/
            done
          done
          cd assets
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.semantic-release.outputs.new_release_git_tag }}" assets/* --repo "${{ github.repository }}"

  announce:
    name: Announce release on Slack
    needs: [semantic-release, upload-assets]
    # Stable releases only — don't spam Slack on every canary from main.
    if: >-
      needs.semantic-release.outputs.new_release_published == 'true' &&
      !contains(needs.semantic-release.outputs.new_release_git_tag, 'canary')
    runs-on: ubuntu-latest
    steps:
      - name: Post release announcement
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          NAME: ${{ github.event.repository.name }}
          TAG: ${{ needs.semantic-release.outputs.new_release_git_tag }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack announcement"
            exit 0
          fi

          title=$(gh release view "$TAG" --repo "$REPO" --json name --jq '.name // ""')
          body=$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body // ""')
          url=$(gh release view "$TAG" --repo "$REPO" --json url --jq '.url')

          header="*${NAME}@${TAG}*"
          if [ -n "$title" ] && [ "$title" != "$TAG" ]; then
            header="${header} — ${title}"
          fi
          text="${header}"$'\n\n'"${body}"$'\n\n'"<${url}|View release>"

          jq -n --arg t "$text" '{text: $t}' \
            | curl -sSf -X POST -H 'Content-type: application/json' --data @- "$SLACK_WEBHOOK_URL"
